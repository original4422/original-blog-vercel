name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  quality:
    name: Quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Use Node.js 24
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit canonical content
        run: pnpm audit:content

      - name: Check formatting and lint
        run: pnpm check

      - name: Type-check workspaces
        run: pnpm typecheck

      - name: Build both applications
        run: pnpm build

      - name: Audit Pages export
        run: pnpm --filter @original/blog-pages audit:static

      - name: Audit build versions
        run: pnpm audit:versions

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Test Pages navigation
        run: pnpm test:e2e
